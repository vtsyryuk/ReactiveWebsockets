name: Publish

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: Version to publish
        required: true
        default: 2.0.0

permissions:
  contents: read

jobs:
  validate:
    name: Validate Publish Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: 'yes'

      - name: Validate publish inputs
        run: ./gradlew clean build jacocoTestReport publishToMavenLocal -PreleaseVersion="${RELEASE_VERSION}" --scan
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.releaseVersion || '2.0-SNAPSHOT' }}

  publish:
    name: Publish GitHub Package
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: 'yes'

      - name: Publish to GitHub Packages
        run: ./gradlew clean build jacocoTestReport publish -PreleaseVersion="${RELEASE_VERSION}" --scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.releaseVersion }}
