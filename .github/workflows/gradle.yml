# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Gradle wrapper version
        run: ./gradlew --version --no-daemon

      - name: Build with Gradle Wrapper
        run: ./gradlew build jacocoTestReport --no-daemon

      - name: Publish coverage summary
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("build/reports/jacoco/test/jacocoTestReport.xml")
          root = ET.parse(report).getroot()

          counters = {
              counter.attrib["type"]: counter.attrib
              for counter in root.findall("counter")
          }

          print("## Code Coverage")
          print()
          print("| Metric | Covered | Missed | Coverage |")
          print("| --- | ---: | ---: | ---: |")
          for metric in ("LINE", "BRANCH", "INSTRUCTION"):
              counter = counters[metric]
              missed = int(counter["missed"])
              covered = int(counter["covered"])
              total = missed + covered
              pct = 100.0 * covered / total if total else 100.0
              print(f"| {metric.title()} | {covered} | {missed} | {pct:.2f}% |")
          print()
          print("Full HTML and XML reports are attached as the `jacoco-coverage-report` artifact.")
          PY

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: |
            build/reports/jacoco/test/html/**
            build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: error

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
